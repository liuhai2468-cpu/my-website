<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈萨克斯坦清关税费核算工具</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; background-color: #f4f7f9; color: #333; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #004a99; margin-bottom: 25px; font-size: 1.4rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .rate-info { font-size: 0.8rem; color: #666; margin-top: 5px; background: #eef2f6; padding: 8px; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #004a99; color: #fff; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; margin-top: 15px; transition: background 0.3s; }
        button:hover { background: #003366; }
        .result-box { margin-top: 25px; padding: 20px; background: #f8f9fa; border-left: 5px solid #004a99; display: none; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dashed #eee; }
        .result-item span:last-child { font-weight: bold; color: #d9534f; }
        .total-item { font-size: 1.2rem; border-bottom: none; margin-top: 10px; color: #004a99 !important; }
        .disclaimer { font-size: 0.75rem; color: #999; margin-top: 20px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>哈萨克斯坦税费核算器</h2>
    
    <div class="form-group">
        <label>货物价值 (货值)</label>
        <input type="number" id="cargoValue" placeholder="请输入金额" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>原始货币</label>
        <select id="currency" onchange="getExchangeRate()">
            <option value="USD">美元 (USD)</option>
            <option value="CNY">人民币 (CNY)</option>
            <option value="EUR">欧元 (EUR)</option>
        </select>
        <div class="rate-info" id="rateDisplay">正在获取最新汇率...</div>
    </div>

    <div class="form-group">
        <label>进口关税税率 (%)</label>
        <input type="number" id="dutyRate" value="5" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>进口增值税率 (%)</label>
        <input type="number" id="vatRate" value="12" disabled>
        <small style="color: #999;">*哈国标准增值税现为12% (已按要求调整)</small>
    </div>

    <button onclick="calculate()">立即核算费用</button>

    <div class="result-box" id="resultBox">
        <div class="result-item">
            <span>申报价值 (KZT):</span>
            <span id="resValueKzt">0</span>
        </div>
        <div class="result-item">
            <span>海关手续费 (固定):</span>
            <span id="resFees">20,000</span>
        </div>
        <div class="result-item">
            <span>进口关税 (Duty):</span>
            <span id="resDuty">0</span>
        </div>
        <div class="result-item">
            <span>进口增值税 (VAT):</span>
            <span id="resVat">0</span>
        </div>
        <div class="result-item total-item">
            <span>预计总税费:</span>
            <span id="resTotal">0</span>
        </div>
        <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">* 以上结果仅供参考，单位为哈萨克斯坦坚戈 (KZT)</p>
    </div>

    <div class="disclaimer">
        免责声明：本工具基于哈国通用税费公式计算，实际清关费用受 HS Code 归类、报废金及海关最新政策影响，请以正式报关单为准。
    </div>
</div>

<script>
    let currentRate = 450; // 默认汇率兜底

    // 获取实时汇率 (API来自全球公认免费接口)
    async function getExchangeRate() {
        const curr = document.getElementById('currency').value;
        const rateDisplay = document.getElementById('rateDisplay');
        rateDisplay.innerText = "正在获取实时汇率...";
        
        try {
            // 使用常用免费汇率API
            const response = await fetch(`https://api.exchangerate-api.com/v4/latest/${curr}`);
            const data = await response.json();
            currentRate = data.rates.KZT;
            rateDisplay.innerText = `当前汇率：1 ${curr} ≈ ${currentRate.toFixed(2)} KZT (实时更新)`;
            calculate();
        } catch (error) {
            rateDisplay.innerText = "汇率接口请求频繁，请手动核对或重试。";
        }
    }

    function calculate() {
        const val = parseFloat(document.getElementById('cargoValue').value) || 0;
        const dRate = parseFloat(document.getElementById('dutyRate').value) / 100 || 0;
        const vRate = 0.12; // 按照哈萨克斯坦当前实际增值税12%计算
        const customFee = 20000; // 海关手续费基数 (根据货值会有波动，此处设为中位数)

        if (val <= 0) return;

        // 1. 换算货值为坚戈
        const valueKzt = val * currentRate;

        // 2. 计算关税 (KZT)
        const dutyAmount = valueKzt * dRate;

        // 3. 计算增值税 (KZT)
        // 哈国增值税计算基数 = (货值 + 关税 + 手续费)
        const vatAmount = (valueKzt + dutyAmount + customFee) * vRate;

        // 4. 总计
        const totalTax = dutyAmount + vatAmount + customFee;

        // 显示结果
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('resValueKzt').innerText = valueKzt.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('resFees').innerText = customFee.toLocaleString();
        document.getElementById('resDuty').innerText = dutyAmount.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('resVat').innerText = vatAmount.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('resTotal').innerText = totalTax.toLocaleString(undefined, {minimumFractionDigits: 2}) + " KZT";
    }

    // 初始化获取汇率
    getExchangeRate();
</script>

</body>
</html>
